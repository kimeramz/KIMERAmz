<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Kimera — Carrinho</title>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/carrinho.css"/>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="/pages/index.html" class="logo">kimera<span>.</span></a>
    <div class="nav-search">
      <svg class="nav-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="Pesquisar..."/>
    </div>
    <div class="nav-actions">
      <a href="/pages/lojas.html" class="nav-link">Lojas</a>
      <a href="/pages/criar.html" class="nav-link">Criar</a>
      <a href="/pages/carrinho.html" class="nav-icon-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span class="cart-badge">0</span>
      </a>
      <a href="/pages/login.html" class="nav-icon-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </a>
      <button class="nav-mobile-menu" onclick="toggleMobileNav()"><span></span><span></span><span></span></button>
    </div>
  </div>
  <div class="mobile-nav-drawer" id="mobileNav">
    <a href="/pages/index.html">Home</a><a href="/pages/lojas.html">Lojas</a>
    <a href="/pages/criar.html">Criar</a><a href="/pages/rastrear.html">Rastrear</a>
    <a href="/pages/contactos.html">Contactos</a>
  </div>
</nav>

<main class="page-container carrinho-main">
  <div class="carrinho-header">
    <h1 class="page-title">O Meu Carrinho</h1>
    <span class="cart-count-label" id="cartCountLabel"></span>
  </div>

  <!-- VAZIO -->
  <div class="carrinho-vazio" id="carrinhoVazio" style="display:none;">
    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#E0E0E0" stroke-width="1"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    <h2>O carrinho está vazio</h2>
    <p>Explore as nossas lojas e adicione produtos.</p>
    <a href="/pages/lojas.html" class="btn btn-red" style="margin-top:20px;">Ver Lojas →</a>
  </div>

  <!-- COM ITENS -->
  <div class="carrinho-layout" id="carrinhoContent" style="display:none;">
    <div class="items-list" id="itemsList"></div>

    <aside class="cart-summary">
      <div class="summary-card">
        <h3>Resumo do Pedido</h3>
        <div class="summary-rows">
          <div class="summary-row"><span id="subtotalLabel">Subtotal</span><span id="subtotal">—</span></div>
          <div class="summary-row"><span>Entrega</span><span>100,00 MT</span></div>
        </div>
        <div class="summary-total"><span>Total</span><span id="totalAmt">—</span></div>
        <a href="/pages/checkout.html" class="btn btn-red" style="width:100%;padding:16px;font-size:15px;margin-top:20px;display:block;text-align:center;">
          Finalizar Compra →
        </a>
        <a href="/pages/index.html" class="btn btn-outline" style="width:100%;padding:14px;font-size:14px;margin-top:10px;display:block;text-align:center;">
          Continuar a Comprar
        </a>
      </div>
      <div class="cupom-card">
        <h4>Cupom de desconto</h4>
        <div class="cupom-input">
          <input type="text" placeholder="Código de desconto..." id="cupomCode"/>
          <button class="btn btn-dark" style="padding:10px 18px;font-size:13px;" onclick="applyCupom()">Verificar</button>
        </div>
        <p class="cupom-msg" id="cupomMsg"></p>
      </div>
    </aside>
  </div>
</main>

<script src="../js/config.js"></script>
<script src="../js/global.js"></script>
<script src="../js/carrinho.js"></script>
</body>
</html>
